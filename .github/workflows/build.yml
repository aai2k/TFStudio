name: Build Windows App (DISABLED — not developed)

# ─────────────────────────────────────────────────────────────────────────────
# DISABLED 2026-06-04. This CI build is legacy / not maintained — it fails on
# the current codebase and was burning the repo's GitHub Actions minutes on
# every push. All automatic triggers (push / pull_request / tags) have been
# removed so it NEVER runs by itself. Releases are built locally instead
# (`npm run dist`). It can still be started by hand from the Actions tab if/when
# the pipeline is fixed. To re-enable, restore the `push` / `pull_request` /
# `tags` triggers below.
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:  # Manual-only — no automatic runs.

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write  # Required for creating releases

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Emscripten (for the WASM TMM kernel)
        uses: mymindstorm/setup-emsdk@v16
        with:
          version: latest

      - name: Build WASM TMM kernel
        run: npm run build:wasm

      - name: Build Electron app
        run: npm run build
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v7
        with:
          name: TFStudio-Windows
          path: |
            dist/*.exe
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/*.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
